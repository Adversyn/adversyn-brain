# Adversyn Autonomous GitHub Bridge — label contract.
# Synced by .github/workflows/labels-sync.yml.

# Agent lanes
- name: "agent:claude"
  color: "1d76db"
  description: "Picked up by Claude Code (large implementation, refactors, complex debugging)."
- name: "agent:codex"
  color: "0e8a16"
  description: "Picked up by Codex (focused patches, tests, CI fixes)."
- name: "primary:claude"
  color: "1d76db"
  description: "When both agents are tagged, Claude is the primary."
- name: "primary:codex"
  color: "0e8a16"
  description: "When both agents are tagged, Codex is the primary."
- name: "multi-agent"
  color: "5319e7"
  description: "Both agents may collaborate on this task."

# Task types
- name: "task:fix"
  color: "d93f0b"
  description: "Bug fix or behavior correction."
- name: "task:test"
  color: "fbca04"
  description: "Add or update tests."
- name: "task:refactor"
  color: "c5def5"
  description: "Refactor without behavior change."
- name: "task:ci"
  color: "bfdadc"
  description: "CI / GitHub Actions / tooling changes."
- name: "task:qa"
  color: "fef2c0"
  description: "Playwright / autonomous QA work."
- name: "task:deploy"
  color: "b60205"
  description: "Deployment-related task (requires status:needs-human-approval)."

# Priority
- name: "priority:high"
  color: "b60205"
  description: "Drop other work to address."

# Status
- name: "status:in-progress"
  color: "fbca04"
  description: "Agent is actively working on this."
- name: "status:blocked"
  color: "b60205"
  description: "Agent is blocked, needs Nova / Darren input."
- name: "status:ready-for-review"
  color: "0e8a16"
  description: "Agent finished — Nova should review."
- name: "status:passed"
  color: "0e8a16"
  description: "CI + Playwright QA passed."
- name: "status:failed"
  color: "b60205"
  description: "CI or Playwright QA failed."
- name: "status:needs-nova-review"
  color: "5319e7"
  description: "Awaiting PM review by Nova."
- name: "status:needs-human-approval"
  color: "b60205"
  description: "Destructive / production / live-money / secrets — Darren must approve before execution."
