name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-qa:
    name: Build, test, and Playwright QA
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL || vars.APP_BASE_URL || 'http://localhost:3000' }}
      QA_USERNAME: ${{ secrets.QA_USERNAME }}
      QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
      QA_AUTH_MODE: ${{ vars.QA_AUTH_MODE || 'none' }}
      QA_SKIP_LOGIN: ${{ vars.QA_SKIP_LOGIN || 'true' }}
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "manager=none" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json detected — JS toolchain steps will be skipped."
            exit 0
          fi
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.pm.outputs.manager != 'none'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ steps.pm.outputs.manager == 'yarn' && 'yarn' || (steps.pm.outputs.manager == 'pnpm' && 'pnpm' || 'npm') }}

      - name: Setup pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        if: steps.pm.outputs.manager != 'none'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm install --frozen-lockfile || pnpm install ;;
            yarn) yarn install --frozen-lockfile || yarn install ;;
            npm)  npm ci || npm install ;;
          esac

      - name: Has script — lint
        if: steps.pm.outputs.manager != 'none'
        id: has_lint
        shell: bash
        run: |
          if node -e "process.exit((require('./package.json').scripts||{}).lint?0:1)" 2>/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No lint script — skipping."
          fi

      - name: Lint
        if: steps.has_lint.outputs.present == 'true'
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm run lint ;;
            yarn) yarn lint ;;
            npm)  npm run lint ;;
          esac

      - name: Has script — typecheck
        if: steps.pm.outputs.manager != 'none'
        id: has_typecheck
        shell: bash
        run: |
          if node -e "process.exit((require('./package.json').scripts||{}).typecheck?0:1)" 2>/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No typecheck script — skipping."
          fi

      - name: Typecheck
        if: steps.has_typecheck.outputs.present == 'true'
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm run typecheck ;;
            yarn) yarn typecheck ;;
            npm)  npm run typecheck ;;
          esac

      - name: Has script — test
        if: steps.pm.outputs.manager != 'none'
        id: has_test
        shell: bash
        run: |
          if node -e "process.exit((require('./package.json').scripts||{}).test?0:1)" 2>/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No test script — skipping."
          fi

      - name: Unit tests
        if: steps.has_test.outputs.present == 'true'
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm test --if-present ;;
            yarn) yarn test --if-present || yarn test ;;
            npm)  npm test --if-present ;;
          esac

      - name: Has script — build
        if: steps.pm.outputs.manager != 'none'
        id: has_build
        shell: bash
        run: |
          if node -e "process.exit((require('./package.json').scripts||{}).build?0:1)" 2>/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No build script — skipping."
          fi

      - name: Build
        if: steps.has_build.outputs.present == 'true'
        run: |
          case "${{ steps.pm.outputs.manager }}" in
            pnpm) pnpm run build ;;
            yarn) yarn build ;;
            npm)  npm run build ;;
          esac

      - name: Detect Playwright
        id: pw
        shell: bash
        run: |
          set -euo pipefail
          if [ -f playwright.config.ts ] || [ -f playwright.config.js ] || [ -f playwright.config.mjs ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No playwright config — skipping E2E."
          fi

      - name: Install Playwright browsers
        if: steps.pw.outputs.present == 'true' && steps.pm.outputs.manager != 'none'
        run: npx --yes playwright install --with-deps chromium

      - name: Run Playwright autonomous QA
        if: steps.pw.outputs.present == 'true' && steps.pm.outputs.manager != 'none'
        id: pwrun
        continue-on-error: true
        run: npx --yes playwright test --reporter=list,html,json

      - name: Generate QA report (qa-report.md)
        if: always() && steps.pw.outputs.present == 'true' && steps.pm.outputs.manager != 'none'
        run: node scripts/generate-qa-report.mjs
        env:
          PW_RESULT: ${{ steps.pwrun.outcome }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Upload Playwright report
        if: always() && steps.pw.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload QA report markdown
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: qa-report.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail if Playwright failed
        if: steps.pw.outputs.present == 'true' && steps.pwrun.outcome == 'failure'
        run: |
          echo "::error::Playwright autonomous QA failed. See uploaded artifacts."
          exit 1
